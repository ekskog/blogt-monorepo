name: Deploy blogtv-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Diagnostic - List Workspace
        run: |
          echo "Current directory: $PWD"
          ls -R
          echo "Checking Secrets Visibility..."
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then echo "GITHUB_TOKEN is MISSING"; else echo "GITHUB_TOKEN is present"; fi
          if [ -z "${{ secrets.KUBECONFIG_FILE_CONTENT }}" ]; then echo "KUBECONFIG_FILE_CONTENT is MISSING"; else echo "KUBECONFIG_FILE_CONTENT is present"; fi
          if [ -z "${{ secrets.VITE_GEMINI_API_KEY }}" ]; then echo "VITE_GEMINI_API_KEY is MISSING"; else echo "VITE_GEMINI_API_KEY is present"; fi

      - name: Set Environment Variables
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/blogtv
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_NAME:$SHORT_SHA" >> $GITHUB_ENV
          echo "Building for: $IMAGE_NAME:$SHORT_SHA"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        run: |
          cd blogtv
          docker build --platform linux/amd64 -t ${{ env.IMAGE_TAG }} -t ${{ env.IMAGE_NAME }}:latest --build-arg VITE_GEMINI_API_KEY="${{ secrets.VITE_GEMINI_API_KEY }}" .
          docker push ${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest
      
      - name: Set Up KUBECONFIG
        run: |
          echo "${{ secrets.KUBECONFIG_FILE_CONTENT }}" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV
                    
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image: ${{ env.IMAGE_TAG }}"
          
          # Use sed for simple image replacement and apply to k8s
          sed "s|ghcr.io/ekskog/blogtv:latest|${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml | kubectl apply -f -
          
          # Rollout status
          kubectl rollout status deployment/blogt-frontend --namespace=blogt --timeout=600s
