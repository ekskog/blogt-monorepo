name: Deploy blogtv-frontend

on:
  push:
    branches:
      - main
    paths:
      - 'blogtv/**'
      - '.github/workflows/blogtv-frontend.yml'
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./blogtv # Commands run from inside the frontend folder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          IMAGE_NAME=ghcr.io/ekskog/blogtv
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG=$IMAGE_NAME:$SHORT_SHA
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=ghcr.io/ekskog/blogtv
          IMAGE_TAG=$IMAGE_NAME:$SHORT_SHA
          LATEST_TAG=$IMAGE_NAME:latest
          echo "Resolved IMAGE_TAG: $IMAGE_TAG"
          echo "Resolved LATEST_TAG: $LATEST_TAG"
          docker buildx build --platform linux/amd64 -t $IMAGE_TAG -t $LATEST_TAG --build-arg VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }} --push .
      
      - name: Set Up KUBECONFIG
        run: |
          echo "${{ secrets.KUBECONFIG_FILE_CONTENT }}" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV
                    
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image: ${{ env.IMAGE_TAG }}"
          
          # Use sed for simple image replacement and apply to k8s
          sed "s|ghcr.io/ekskog/blogtv:latest|${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml | kubectl apply -f -
          
          # Rollout status
          kubectl rollout status deployment/blogt-frontend --namespace=blogt --timeout=600s
