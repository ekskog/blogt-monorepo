name: Deploy blogt-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Diagnostic - List Workspace
        run: |
          echo "Current directory: $PWD"
          ls -R
          echo "Checking Secrets Visibility..."
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then echo "GITHUB_TOKEN is MISSING"; else echo "GITHUB_TOKEN is present"; fi
          if [ -z "${{ secrets.KUBECONFIG_FILE_CONTENT }}" ]; then echo "KUBECONFIG_FILE_CONTENT is MISSING"; else echo "KUBECONFIG_FILE_CONTENT is present"; fi

      - name: Set Environment Variables
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/blogt-api
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_NAME:$SHORT_SHA" >> $GITHUB_ENV
          echo "Building for: $IMAGE_NAME:$SHORT_SHA"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        run: |
          cd blogt-api
          docker build --platform linux/amd64 -t ${{ env.IMAGE_TAG }} -t ${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest
      
      - name: Set Up KUBECONFIG
        run: |
          echo "${{ secrets.KUBECONFIG_FILE_CONTENT }}" > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV
                    
      - name: Verify image exists before deployment
        run: |
          echo "Verifying image exists: ${{ env.IMAGE_TAG }}"
          docker manifest inspect ${{ env.IMAGE_TAG }}
                    
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image: ${{ env.IMAGE_TAG }}"
          
          # Update the deployment manifest with the correct image tag and apply it
          sed "s|ghcr.io/ekskog/blogt-api:latest|${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml | kubectl apply -f -
          
          # Apply other manifests
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/auto-scaler.yaml

          # Wait for rollout
          kubectl rollout status deployment/blogt-api --namespace=blogt --timeout=600s

      - name: Debug on Failure
        if: failure()
        run: |
          echo "Deployment failed. Gathering debug information..."
          kubectl describe deployment blogt-api --namespace=blogt
          kubectl describe pods -l app=blogt-api --namespace=blogt
          kubectl logs -l app=blogt-api --namespace=blogt --tail=50
